name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'android-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/mobile/android-release.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_REQUIRE_RELEASE_SIGNING: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Write mobile environment
        run: |
          API_URL="${{ secrets.EXPO_PUBLIC_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://mygreed.shop"
          fi
          printf 'EXPO_PUBLIC_API_URL=%s\n' "$API_URL" > mobile/.env.mobile

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name secret is required"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Build release APK
        working-directory: mobile
        run: npm run build:apk:prebuild

      - name: Collect APK
        run: |
          mkdir -p mobile/dist
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            APK_NAME="greed-android-latest.apk"
          else
            APK_NAME="greed-${GITHUB_REF_NAME:-manual}.apk"
          fi
          cp mobile/android/app/build/outputs/apk/release/*.apk "mobile/dist/$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: greed-android-apk
          path: mobile/dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/dist/*.apk
          generate_release_notes: true

      - name: Publish latest Android Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android Latest
          body: Latest Android APK from master.
          files: mobile/dist/greed-android-latest.apk
          overwrite_files: true
          prerelease: true
          make_latest: false
