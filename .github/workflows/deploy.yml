name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: greed-production
  cancel-in-progress: false

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt

      - name: Run backend tests
        env:
          DATABASE_URL: mysql+pymysql://ci:ci@127.0.0.1:3306/ci?charset=utf8mb4
        run: python -m pytest backend/tests -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.OCI_DEPLOY_KEY }}" > ~/.ssh/greed_deploy
          chmod 600 ~/.ssh/greed_deploy
          printf '%s\n' "${{ secrets.OCI_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        env:
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_HOST: ${{ secrets.OCI_DEPLOY_HOST }}
          DEPLOY_PORT: "22"
          DEPLOY_USER: ${{ secrets.OCI_DEPLOY_USER }}
        run: |
          ssh \
            -i ~/.ssh/greed_deploy \
            -p "${DEPLOY_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" < scripts/deploy-production.sh
